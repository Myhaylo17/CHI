<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="num1" placeholder="Перше число">
    <input type="text" id="operator" placeholder="Операція (+ - * /)">
    <input type="text" id="num2" placeholder="Друге число">

    <div class="keyboard">
        <button onclick="addValue('1')">1</button>
        <button onclick="addValue('2')">2</button>
        <button onclick="addValue('3')">3</button>
        <button onclick="setOperator('+')">+</button>

        <button onclick="addValue('4')">4</button>
        <button onclick="addValue('5')">5</button>
        <button onclick="addValue('6')">6</button>
        <button onclick="setOperator('-')">-</button>

        <button onclick="addValue('7')">7</button>
        <button onclick="addValue('8')">8</button>
        <button onclick="addValue('9')">9</button>
        <button onclick="setOperator('*')">*</button>

        <button onclick="addValue('0')">0</button>
        <button onclick="clearAll()">C</button>
        <button onclick="setOperator('/')">/</button>
    </div>

    <button class="calculate" onclick="calculate()">Розрахувати</button>
</div>

<script src="script.js"></script>
</body>
</html>
